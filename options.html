<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Jira SprintLens — Settings</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      font-size: 14px; color: #172B4D; background: #F4F5F7;
      min-width: 420px; padding: 24px;
    }
    h1 { font-size: 18px; color: #0052CC; margin-bottom: 4px; }
    .subtitle { font-size: 12px; color: #6B778C; margin-bottom: 24px; }

    .section { background: #fff; border-radius: 8px; padding: 20px; margin-bottom: 16px;
      box-shadow: 0 1px 4px rgba(9,30,66,.1); }
    .section h2 { font-size: 13px; font-weight: 700; color: #6B778C;
      text-transform: uppercase; letter-spacing: .5px; margin-bottom: 12px; }

    .built-in-list { list-style: none; }
    .built-in-list li {
      padding: 6px 10px; background: #F4F5F7; border-radius: 4px;
      font-size: 13px; color: #42526E; margin-bottom: 6px;
      display: flex; align-items: center; gap: 8px;
    }
    .built-in-list li::before {
      content: '🔒'; font-size: 12px;
    }

    .add-row { display: flex; gap: 8px; margin-bottom: 12px; }
    .add-row input {
      flex: 1; padding: 8px 12px; border: 2px solid #DFE1E6; border-radius: 6px;
      font-size: 13px; color: #172B4D; background: #FAFBFC;
      transition: border-color .15s;
    }
    .add-row input:focus { border-color: #2684FF; outline: none; background: #fff; }
    .add-row input::placeholder { color: #A5ADBA; }
    .btn {
      padding: 8px 16px; border: none; border-radius: 6px; font-size: 13px;
      font-weight: 600; cursor: pointer; transition: background .15s; white-space: nowrap;
    }
    .btn-primary { background: #0052CC; color: #fff; }
    .btn-primary:hover { background: #0065FF; }

    .domain-list { list-style: none; }
    .domain-list li {
      display: flex; align-items: center; justify-content: space-between;
      padding: 8px 10px; border-radius: 4px; margin-bottom: 6px;
      background: #F4F5F7; font-size: 13px; color: #172B4D;
    }
    .domain-list li:hover { background: #EBECF0; }
    .remove-btn {
      background: none; border: none; cursor: pointer; color: #A5ADBA;
      font-size: 16px; line-height: 1; padding: 0 4px; border-radius: 3px;
      transition: color .1s;
    }
    .remove-btn:hover { color: #FF5630; }

    .empty { font-size: 13px; color: #A5ADBA; padding: 8px 0; }

    .toast {
      position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
      background: #36B37E; color: #fff; padding: 8px 20px; border-radius: 6px;
      font-size: 13px; font-weight: 600; opacity: 0; transition: opacity .2s;
      pointer-events: none;
    }
    .toast.show { opacity: 1; }
    .error { color: #FF5630; font-size: 12px; margin-top: 4px; min-height: 18px; }
  </style>
</head>
<body>
  <h1><img src="icons/icon48.png" width="28" height="28" alt="SprintLens" style="vertical-align:middle;margin-right:8px;border-radius:6px"> Jira SprintLens</h1>
  <p class="subtitle">Settings</p>

  <div class="section">
    <h2>Built-in Domains</h2>
    <ul class="built-in-list">
      <li>*.atlassian.net</li>
      <li>jiratoolchain.collaborationlayer-traton.com</li>
    </ul>
  </div>

  <div class="section">
    <h2>Custom Jira Domains</h2>
    <div class="add-row">
      <input type="text" id="domain-input" aria-label="Domain" placeholder="e.g. jira.example.com">
      <button class="btn btn-primary" id="add-btn">Add</button>
    </div>
    <div class="error" id="error-msg"></div>
    <ul class="domain-list" id="domain-list">
      <li class="empty" id="empty-msg">No custom domains added yet.</li>
    </ul>
  </div>

  <div class="toast" id="toast">Saved</div>

  <script src="options.js"></script>
</body>
</html>
